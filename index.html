<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>เรียนรู้ — กอร์น & กวิน 🌟</title>
<meta name="theme-color" content="#1565c0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="เรียนรู้">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none;}
  html,body{margin:0;padding:0;height:100%;}
  body{font-family:"Comic Sans MS","Chalkboard SE","Sassoon Primary","Segoe UI",Tahoma,sans-serif;
    background:linear-gradient(160deg,#dff1ff,#ffe0ef); min-height:100%;
    display:flex; align-items:center; justify-content:center; padding:20px; color:#243b53;}
  .wrap{width:100%; max-width:560px; text-align:center;}
  h1{font-size:32px; margin:0 0 4px; color:#0d47a1;}
  .sub{font-size:18px; font-weight:bold; color:#5b7a99; margin-bottom:26px;}
  .who{display:flex; gap:18px; flex-direction:column;}
  .pick{display:flex; align-items:center; gap:20px; width:100%; text-align:left; cursor:pointer; border:none;
    font-family:inherit; border-radius:28px; padding:28px 26px; color:#fff; transition:transform .08s;}
  .pick:active{transform:scale(.97);}
  .pick .av{font-size:64px;}
  .pick .nm{font-size:32px; font-weight:bold;}
  .pick .ds{font-size:15px; opacity:.95; font-weight:normal; margin-top:3px;}
  .gorn{background:linear-gradient(135deg,#42a5f5,#1565c0); box-shadow:0 8px 0 #0d47a1;}
  .gwang{background:linear-gradient(135deg,#ff7eb3,#ec407a); box-shadow:0 8px 0 #c2185b;}
  .foot{margin-top:26px; color:#8aa1b5; font-size:13px;}
</style>
</head>
<body>
  <div class="wrap">
    <h1>🌟 มาเรียนรู้กันเถอะ</h1>
    <div class="sub">ใครจะเล่นวันนี้?</div>
    <div class="who">
      <button class="pick gorn" onclick="location.href='gorn.html'">
        <span class="av">👦</span>
        <span><span class="nm">กอร์น</span><span class="ds">เควสภาษาอังกฤษ + ฝึกพิมพ์</span></span>
      </button>
      <button class="pick gwang" onclick="location.href='gwang.html'">
        <span class="av">👧</span>
        <span><span class="nm">กวิน</span><span class="ds">เกมแตะรูป: สี · นับเลข · รูปทรง · คำศัพท์ · บวก-ลบ</span></span>
      </button>
    </div>
    <div class="foot">เลือกชื่อเพื่อเริ่มเล่น 😊</div>
  </div>
<script>
if("serviceWorker" in navigator && location.protocol.indexOf("http")===0){
  window.addEventListener("load",function(){navigator.serviceWorker.register("sw.js").catch(function(){});});
}
</script>
</body>
</html>
